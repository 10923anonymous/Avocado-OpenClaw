<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, height=480, initial-scale=1.0, user-scalable=no">
    <title>🥑 Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 800px;
            height: 480px;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a3d1a 0%, #2d5016 20%, #3d6b1f 40%, #90c040 50%, #ff6b35 70%, #e74c3c 85%, #8b4513 100%);
            color: #fff;
        }

        .back-button {
            position: fixed;
            top: 8px;
            left: 8px;
            padding: 6px 12px;
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
            border: 2px solid #fff;
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            z-index: 10000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .container {
            width: 800px;
            height: 480px;
            display: flex;
            flex-direction: column;
            padding: 40px 10px 10px;
        }

        .header {
            text-align: center;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            justify-content: center;
        }

        .tab-btn {
            padding: 6px 16px;
            border: 2px solid #fff;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
        }

        .content {
            flex: 1;
            display: flex;
            gap: 10px;
            height: 380px;
        }

        .calculator-section {
            width: 480px;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .display {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            text-align: right;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .display-history {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 3px;
        }

        .display-main {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            flex: 1;
        }

        .calc-btn {
            padding: 8px 4px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
        }

        .btn-number {
            background: linear-gradient(135deg, #90c040, #6b9c2e);
            color: #fff;
        }

        .btn-operator {
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
            color: #fff;
        }

        .btn-function {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #fff;
            font-size: 11px;
        }

        .btn-clear {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: #fff;
        }

        .btn-equals {
            background: linear-gradient(135deg, #2d5016, #3d6b1f);
            color: #fff;
            grid-column: span 2;
        }

        .converter-section {
            width: 280px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
        }

        .number-viewer {
            background: linear-gradient(135deg, rgba(45, 80, 22, 0.8), rgba(61, 107, 31, 0.8));
            border: 2px solid #90c040;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            text-align: center;
        }

        .number-viewer-label {
            font-size: 10px;
            color: #90c040;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .number-viewer-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .converter-main {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .keypad-container {
            flex: 1;
        }

        .converter-types-vertical {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 80px;
        }

        .conv-type-btn-vertical {
            padding: 8px 6px;
            border: 1px solid #fff;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .conv-type-btn-vertical.active {
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 120px;
        }

        .unit-selectors-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .unit-group-vertical {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .unit-group-vertical label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            text-align: center;
        }

        .unit-group-vertical select {
            padding: 6px 8px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 12px;
            width: 100%;
        }

        .unit-arrow-small {
            text-align: center;
            font-size: 16px;
            color: #90c040;
        }

        .converter-displays {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-display {
            flex: 1;
            background: linear-gradient(135deg, rgba(45, 80, 22, 0.8), rgba(61, 107, 31, 0.8));
            border: 2px solid #90c040;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .input-label {
            font-size: 10px;
            color: #90c040;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .input-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
        }

        .unit-label {
            font-size: 14px;
            color: #90c040;
            font-weight: normal;
        }

        .result-display {
            flex: 1;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.3), rgba(231, 76, 60, 0.3));
            border: 2px solid #ff6b35;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .result-label {
            font-size: 10px;
            color: #ff6b35;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .result-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
        }

        .result-value .unit-label {
            color: #ff6b35;
        }

        .keypad-btn {
            padding: 10px;
            border: 2px solid #90c040;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(144, 192, 64, 0.3), rgba(107, 156, 46, 0.3));
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .keypad-btn:hover {
            background: linear-gradient(135deg, #90c040, #6b9c2e);
            transform: scale(1.05);
        }

        .keypad-btn:active {
            transform: scale(0.95);
        }

        .keypad-btn.clear {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.5), rgba(192, 57, 43, 0.5));
            border-color: #e74c3c;
        }

        .keypad-btn.clear:hover {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .result-display {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.3), rgba(231, 76, 60, 0.3));
            border: 2px solid #ff6b35;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
        }

        .result-label {
            font-size: 10px;
            color: #ff6b35;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .result-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .unit-selectors {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .unit-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .unit-group label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            text-align: center;
        }

        .unit-group select {
            padding: 8px 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            min-width: 100px;
        }

        .unit-arrow {
            font-size: 24px;
            color: #90c040;
            margin-top: 15px;
        }

        .converter-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
            color: #ff6b35;
        }

        .converter-type {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .conv-type-btn {
            padding: 4px 10px;
            border: 1px solid #fff;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 10px;
            cursor: pointer;
        }

        .conv-type-btn.active {
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
        }

        .converter-inputs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .conv-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .conv-group label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
        }

        .conv-group input, .conv-group select {
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
        }

        .conv-arrow {
            text-align: center;
            font-size: 16px;
            color: #ff6b35;
        }

        .scientific-extra {
            display: none;
        }

        .scientific-extra.visible {
            display: flex;
        }
    </style>
</head>
<body>
    <a href="https://10923anonymous.github.io/Avocado-OpenClaw/avocado-website/touchscreen.html" class="back-button">← Back</a>
    
    <div class="container">
        <div class="header">
            <h1>🥑🍅🫒 Calculator</h1>
        </div>

        <div class="mode-tabs">
            <button class="tab-btn active" id="standardTab" onclick="showTab('standard')">Standard</button>
            <button class="tab-btn" id="scientificTab" onclick="showTab('scientific')">Scientific</button>
            <button class="tab-btn" id="converterTab" onclick="showTab('converter')">Converter</button>
        </div>

        <div class="content">
            <div class="calculator-section" id="calcSection">
                <div class="display">
                    <div class="display-history" id="history"></div>
                    <div class="display-main" id="display">0</div>
                </div>
                <div class="calc-buttons">
                    <button class="calc-btn btn-clear" onclick="clearAll()">AC</button>
                    <button class="calc-btn btn-clear" onclick="clearEntry()">CE</button>
                    <button class="calc-btn btn-function" onclick="appendOperator('%')">%</button>
                    <button class="calc-btn btn-operator" onclick="appendOperator('/')">÷</button>
                    <button class="calc-btn btn-function scientific-extra" onclick="toggleSign()">±</button>
                    
                    <button class="calc-btn btn-function scientific-extra" onclick="insertFunction('sin')">sin</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('7')">7</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('8')">8</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('9')">9</button>
                    <button class="calc-btn btn-operator" onclick="appendOperator('*')">×</button>
                    
                    <button class="calc-btn btn-function scientific-extra" onclick="insertFunction('cos')">cos</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('4')">4</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('5')">5</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('6')">6</button>
                    <button class="calc-btn btn-operator" onclick="appendOperator('-')">−</button>
                    
                    <button class="calc-btn btn-function scientific-extra" onclick="insertFunction('tan')">tan</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('1')">1</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('2')">2</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('3')">3</button>
                    <button class="calc-btn btn-operator" onclick="appendOperator('+')">+</button>
                    
                    <button class="calc-btn btn-function scientific-extra" onclick="insertFunction('sqrt')">√</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('0')">0</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('.')">.</button>
                    <button class="calc-btn btn-function" onclick="deleteLast()">⌫</button>
                    <button class="calc-btn btn-equals" onclick="calculate()">=</button>
                </div>
            </div>

            <div class="converter-section" id="converterSection">
                <!-- Top row: Input and Result side by side -->
                <div class="converter-displays">
                    <div class="input-display">
                        <div class="input-label">Entering</div>
                        <div class="input-value"><span id="numberViewer">0</span> <span class="unit-label" id="fromUnitLabel">meters</span></div>
                    </div>
                    <div class="result-display">
                        <div class="result-label">Result</div>
                        <div class="result-value"><span id="resultValue">0</span> <span class="unit-label" id="toUnitLabel">feet</span></div>
                    </div>
                </div>

                <!-- Middle: Keypad on left, Converter Types and Unit Selectors on right -->
                <div class="converter-main">
                    <div class="keypad-container">
                        <div class="keypad" id="keypad">
                            <button class="keypad-btn" onclick="keypadInput('7')">7</button>
                            <button class="keypad-btn" onclick="keypadInput('8')">8</button>
                            <button class="keypad-btn" onclick="keypadInput('9')">9</button>
                            <button class="keypad-btn" onclick="keypadInput('4')">4</button>
                            <button class="keypad-btn" onclick="keypadInput('5')">5</button>
                            <button class="keypad-btn" onclick="keypadInput('6')">6</button>
                            <button class="keypad-btn" onclick="keypadInput('1')">1</button>
                            <button class="keypad-btn" onclick="keypadInput('2')">2</button>
                            <button class="keypad-btn" onclick="keypadInput('3')">3</button>
                            <button class="keypad-btn" onclick="keypadInput('.')">.</button>
                            <button class="keypad-btn" onclick="keypadInput('0')">0</button>
                            <button class="keypad-btn clear" onclick="keypadClear()">C</button>
                        </div>
                    </div>
                    <div class="right-panel">
                        <div class="converter-types-vertical">
                            <button class="conv-type-btn-vertical active" onclick="setConvType('length')">Length</button>
                            <button class="conv-type-btn-vertical" onclick="setConvType('weight')">Weight</button>
                            <button class="conv-type-btn-vertical" onclick="setConvType('temp')">Temp</button>
                            <button class="conv-type-btn-vertical" onclick="setConvType('volume')">Volume</button>
                        </div>
                        <div class="unit-selectors-vertical">
                            <div class="unit-group-vertical">
                                <label>From</label>
                                <select id="fromUnit" onchange="updateUnitLabels(); convert()">
                                    <option value="m">Meters</option>
                                    <option value="km">Kilometers</option>
                                    <option value="cm">Centimeters</option>
                                    <option value="mm">Millimeters</option>
                                    <option value="ft">Feet</option>
                                    <option value="in">Inches</option>
                                    <option value="yd">Yards</option>
                                    <option value="mi">Miles</option>
                                </select>
                            </div>
                            <div class="unit-arrow-small">➜</div>
                            <div class="unit-group-vertical">
                                <label>To</label>
                                <select id="toUnit" onchange="updateUnitLabels(); convert()">
                                    <option value="ft">Feet</option>
                                    <option value="m">Meters</option>
                                    <option value="km">Kilometers</option>
                                    <option value="cm">Centimeters</option>
                                    <option value="mm">Millimeters</option>
                                    <option value="in">Inches</option>
                                    <option value="yd">Yards</option>
                                    <option value="mi">Miles</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentInput = '0', previousInput = '', operator = '', shouldResetScreen = false;
        let currentConvType = 'length';
        let convInputValue = '';

        const units = {
            length: { m: 1, km: 1000, cm: 0.01, mm: 0.001, ft: 0.3048, in: 0.0254, yd: 0.9144, mi: 1609.34 },
            weight: { kg: 1, g: 0.001, mg: 0.000001, lb: 0.453592, oz: 0.0283495, st: 6.35029 },
            volume: { l: 1, ml: 0.001, gal: 3.78541, qt: 0.946353, pt: 0.473176, cup: 0.236588, floz: 0.0295735 }
        };

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            if (tab === 'converter') {
                document.getElementById('calcSection').style.display = 'none';
                document.getElementById('converterSection').classList.add('active');
            } else {
                document.getElementById('calcSection').style.display = 'flex';
                document.getElementById('converterSection').classList.remove('active');
                document.querySelectorAll('.scientific-extra').forEach(b => b.style.display = tab === 'scientific' ? 'flex' : 'none');
            }
        }

        function updateDisplay() {
            document.getElementById('display').textContent = currentInput;
            document.getElementById('history').textContent = previousInput + ' ' + operator;
        }

        function appendNumber(num) {
            if (shouldResetScreen) {
                currentInput = num === '.' ? '0.' : num;
                shouldResetScreen = false;
            } else {
                if (num === '.' && currentInput.includes('.')) return;
                if (currentInput === '0' && num !== '.') currentInput = num;
                else currentInput += num;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== '' && !shouldResetScreen) calculate();
            previousInput = currentInput;
            operator = op;
            shouldResetScreen = true;
            updateDisplay();
        }

        function calculate() {
            if (operator === '' || previousInput === '') return;
            let result;
            const prev = parseFloat(previousInput), current = parseFloat(currentInput);
            switch(operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': 
                    if (current === 0) { alert('Cannot divide by zero!'); return; }
                    result = prev / current; break;
                case '%': result = prev % current; break;
                default: return;
            }
            currentInput = parseFloat(result.toFixed(10)).toString();
            operator = ''; previousInput = '';
            shouldResetScreen = true;
            updateDisplay();
        }

        function clearAll() { currentInput = '0'; previousInput = ''; operator = ''; updateDisplay(); }
        function clearEntry() { currentInput = '0'; updateDisplay(); }
        function deleteLast() { currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0'; updateDisplay(); }

        function insertFunction(func) {
            const current = parseFloat(currentInput);
            let result;
            switch(func) {
                case 'sin': result = Math.sin(current * Math.PI / 180); break;
                case 'cos': result = Math.cos(current * Math.PI / 180); break;
                case 'tan': result = Math.tan(current * Math.PI / 180); break;
                case 'sqrt': result = Math.sqrt(current); break;
                default: return;
            }
            currentInput = parseFloat(result.toFixed(10)).toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        function toggleSign() { currentInput = (parseFloat(currentInput) * -1).toString(); updateDisplay(); }

        document.getElementById('standardTab').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('scientificTab').classList.remove('active');
            document.querySelectorAll('.scientific-extra').forEach(btn => btn.classList.remove('visible'));
        });

        document.getElementById('scientificTab').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('standardTab').classList.remove('active');
            document.querySelectorAll('.scientific-extra').forEach(btn => btn.classList.add('visible'));
        });

        function setConvType(type) {
            currentConvType = type;
            document.querySelectorAll('.conv-type-btn, .conv-type-btn-vertical').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const fromSelect = document.getElementById('fromUnit');
            const toSelect = document.getElementById('toUnit');
            fromSelect.innerHTML = ''; toSelect.innerHTML = '';
            
            let options = [];
            switch(type) {
                case 'length':
                    options = [['m','Meters'],['km','Kilometers'],['cm','Centimeters'],['mm','Millimeters'],
                               ['ft','Feet'],['in','Inches'],['yd','Yards'],['mi','Miles']];
                    break;
                case 'weight':
                    options = [['kg','Kilograms'],['g','Grams'],['mg','Milligrams'],
                               ['lb','Pounds'],['oz','Ounces'],['st','Stone']];
                    break;
                case 'temp':
                    options = [['c','Celsius'],['f','Fahrenheit'],['k','Kelvin']];
                    break;
                case 'volume':
                    options = [['l','Liters'],['ml','Milliliters'],['gal','Gallons'],
                               ['qt','Quarts'],['pt','Pints'],['cup','Cups'],['floz','Fluid Oz']];
                    break;
            }
            
            options.forEach(([value, text]) => {
                fromSelect.add(new Option(text, value));
                toSelect.add(new Option(text, value));
            });
            
            if (type === 'length') { toSelect.value = 'ft'; }
            else if (type === 'weight') { fromSelect.value = 'kg'; toSelect.value = 'lb'; }
            else if (type === 'temp') { fromSelect.value = 'c'; toSelect.value = 'f'; }
            else if (type === 'volume') { toSelect.value = 'gal'; }
            
            keypadClear();
            updateUnitLabels();
        }

        function updateUnitLabels() {
            const fromSelect = document.getElementById('fromUnit');
            const toSelect = document.getElementById('toUnit');
            const fromLabel = fromSelect.options[fromSelect.selectedIndex].text.toLowerCase();
            const toLabel = toSelect.options[toSelect.selectedIndex].text.toLowerCase();
            document.getElementById('fromUnitLabel').textContent = fromLabel;
            document.getElementById('toUnitLabel').textContent = toLabel;
        }

        function convert() {
            const fromValue = parseFloat(convInputValue);
            const numberViewer = document.getElementById('numberViewer');
            const resultValue = document.getElementById('resultValue');
            
            if (!convInputValue || isNaN(fromValue)) { 
                resultValue.textContent = '0';
                numberViewer.textContent = '0';
                return; 
            }
            
            numberViewer.textContent = fromValue.toLocaleString();
            
            const fromUnit = document.getElementById('fromUnit').value;
        }

        function keypadInput(key) {
            if (key === '.' && convInputValue.includes('.')) return;
            convInputValue += key;
            document.getElementById('fromValue').value = convInputValue;
            convert();
        }

        function keypadClear() {
            convInputValue = '';
            document.getElementById('numberViewer').textContent = '0';
            document.getElementById('resultValue').textContent = '0';
            document.getElementById('numberViewer').textContent = '0';
            const toUnit = document.getElementById('toUnit').value;
            let result;
            
            if (currentConvType === 'temp') {
                let celsius;
                switch(fromUnit) {
                    case 'c': celsius = fromValue; break;
                    case 'f': celsius = (fromValue - 32) * 5/9; break;
                    case 'k': celsius = fromValue - 273.15; break;
                }
                switch(toUnit) {
                    case 'c': result = celsius; break;
                    case 'f': result = (celsius * 9/5) + 32; break;
                    case 'k': result = celsius + 273.15; break;
                }
            } else {
                const unitData = units[currentConvType];
                result = (fromValue * unitData[fromUnit]) / unitData[toUnit];
            }
            
            document.getElementById('resultValue').textContent = parseFloat(result.toFixed(6)).toLocaleString();
        }
    </script>
</body>
</html>
