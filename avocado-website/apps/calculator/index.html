<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, height=480, initial-scale=1.0, user-scalable=no">
    <title>🥑 Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 800px;
            height: 480px;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d5016 0%, #e74c3c 50%, #8b4513 100%);
            color: #fff;
        }

        .back-button {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 8px 14px;
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
            border: 2px solid #fff;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            z-index: 10000;
            transition: all 0.2s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .back-button:hover {
            transform: scale(1.05);
        }

        .container {
            width: 800px;
            height: 480px;
            display: flex;
            flex-direction: column;
            padding: 50px 15px 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .tab-btn {
            padding: 8px 20px;
            border: 2px solid #fff;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
        }

        .content {
            flex: 1;
            display: flex;
            gap: 15px;
        }

        /* Calculator Section */
        .calculator-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .display {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .display-history {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .display-main {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            flex: 1;
        }

        .calc-btn {
            padding: 12px 8px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        .btn-number {
            background: linear-gradient(135deg, #90c040, #6b9c2e);
            color: #fff;
        }

        .btn-operator {
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
            color: #fff;
        }

        .btn-function {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #fff;
            font-size: 13px;
        }

        .btn-clear {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: #fff;
        }

        .btn-equals {
            background: linear-gradient(135deg, #2d5016, #3d6b1f);
            color: #fff;
            grid-column: span 2;
        }

        /* Converter Section */
        .converter-section {
            width: 280px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
        }

        .converter-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            color: #ff6b35;
        }

        .converter-type {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .conv-type-btn {
            padding: 6px 12px;
            border: 1px solid #fff;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .conv-type-btn.active {
            background: linear-gradient(135deg, #ff6b35, #e74c3c);
        }

        .converter-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .conv-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .conv-group label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
        }

        .conv-group input, .conv-group select {
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
        }

        .conv-group select {
            cursor: pointer;
        }

        .conv-group select option {
            background: #2d5016;
            color: #fff;
        }

        .conv-arrow {
            text-align: center;
            font-size: 20px;
            color: #ff6b35;
        }

        .hidden {
            display: none !important;
        }

        /* Scientific mode extra buttons */
        .scientific-extra {
            display: contents;
        }
    </style>
</head>
<body>
    <a href="https://10923anonymous.github.io/Avocado-OpenClaw/avocado-website/touchscreen.html" class="back-button">← Back</a>
    
    <div class="container">
        <div class="header">
            <h1>🥑🍅🫒 Calculator & Converter</h1>
        </div>

        <div class="mode-tabs">
            <button class="tab-btn active" id="standardTab">Standard</button>
            <button class="tab-btn" id="scientificTab">Scientific</button>
        </div>

        <div class="content">
            <!-- Calculator -->
            <div class="calculator-section">
                <div class="display">
                    <div class="display-history" id="history"></div>
                    <div class="display-main" id="display">0</div>
                </div>
                <div class="calc-buttons" id="calcButtons">
                    <!-- Row 1 -->
                    <button class="calc-btn btn-clear" onclick="clearAll()">AC</button>
                    <button class="calc-btn btn-clear" onclick="clearEntry()">CE</button>
                    <button class="calc-btn btn-function" onclick="appendOperator('%')">%</button>
                    <button class="calc-btn btn-operator" onclick="appendOperator('/')">÷</button>
                    <button class="calc-btn btn-function scientific-extra" onclick="toggleSign()">±</button>
                    
                    <!-- Row 2 -->
                    <button class="calc-btn btn-function scientific-extra" onclick="insertFunction('sin')">sin</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('7')">7</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('8')">8</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('9')">9</button>
                    <button class="calc-btn btn-operator" onclick="appendOperator('*')">×</button>
                    
                    <!-- Row 3 -->
                    <button class="calc-btn btn-function scientific-extra" onclick="insertFunction('cos')">cos</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('4')">4</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('5')">5</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('6')">6</button>
                    <button class="calc-btn btn-operator" onclick="appendOperator('-')">−</button>
                    
                    <!-- Row 4 -->
                    <button class="calc-btn btn-function scientific-extra" onclick="insertFunction('tan')">tan</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('1')">1</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('2')">2</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('3')">3</button>
                    <button class="calc-btn btn-operator" onclick="appendOperator('+')">+</button>
                    
                    <!-- Row 5 -->
                    <button class="calc-btn btn-function scientific-extra" onclick="insertFunction('sqrt')">√</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('0')">0</button>
                    <button class="calc-btn btn-number" onclick="appendNumber('.')">.</button>
                    <button class="calc-btn btn-function" onclick="deleteLast()">⌫</button>
                    <button class="calc-btn btn-equals" onclick="calculate()">=</button>
                </div>
            </div>

            <!-- Unit Converter -->
            <div class="converter-section">
                <div class="converter-title">🔄 Unit Converter</div>
                <div class="converter-type">
                    <button class="conv-type-btn active" onclick="setConvType('length')">Length</button>
                    <button class="conv-type-btn" onclick="setConvType('weight')">Weight</button>
                    <button class="conv-type-btn" onclick="setConvType('temp')">Temp</button>
                    <button class="conv-type-btn" onclick="setConvType('volume')">Volume</button>
                </div>
                <div class="converter-inputs" id="converterInputs">
                    <div class="conv-group">
                        <label>From</label>
                        <input type="number" id="fromValue" placeholder="Enter value" oninput="convert()">
                        <select id="fromUnit" onchange="convert()">
                            <option value="m">Meters</option>
                            <option value="km">Kilometers</option>
                            <option value="cm">Centimeters</option>
                            <option value="mm">Millimeters</option>
                            <option value="ft">Feet</option>
                            <option value="in">Inches</option>
                            <option value="yd">Yards</option>
                            <option value="mi">Miles</option>
                        </select>
                    </div>
                    <div class="conv-arrow">⬇</div>
                    <div class="conv-group">
                        <label>To</label>
                        <input type="number" id="toValue" placeholder="Result" readonly>
                        <select id="toUnit" onchange="convert()">
                            <option value="ft">Feet</option>
                            <option value="m">Meters</option>
                            <option value="km">Kilometers</option>
                            <option value="cm">Centimeters</option>
                            <option value="mm">Millimeters</option>
                            <option value="in">Inches</option>
                            <option value="yd">Yards</option>
                            <option value="mi">Miles</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Calculator state
        let currentInput = '0';
        let previousInput = '';
        let operator = '';
        let shouldResetScreen = false;
        let isScientific = false;

        // Unit definitions
        const units = {
            length: {
                m: 1,
                km: 1000,
                cm: 0.01,
                mm: 0.001,
                ft: 0.3048,
                in: 0.0254,
                yd: 0.9144,
                mi: 1609.34
            },
            weight: {
                kg: 1,
                g: 0.001,
                mg: 0.000001,
                lb: 0.453592,
                oz: 0.0283495,
                st: 6.35029
            },
            volume: {
                l: 1,
                ml: 0.001,
                gal: 3.78541,
                qt: 0.946353,
                pt: 0.473176,
                cup: 0.236588,
                floz: 0.0295735
            }
        };

        // Display functions
        function updateDisplay() {
            document.getElementById('display').textContent = currentInput;
            document.getElementById('history').textContent = previousInput + ' ' + operator;
        }

        function appendNumber(num) {
            if (shouldResetScreen) {
                currentInput = num === '.' ? '0.' : num;
                shouldResetScreen = false;
            } else {
                if (num === '.' && currentInput.includes('.')) return;
                if (currentInput === '0' && num !== '.') {
                    currentInput = num;
                } else {
                    currentInput += num;
                }
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== '' && !shouldResetScreen) {
                calculate();
            }
            previousInput = currentInput;
            operator = op;
            shouldResetScreen = true;
            updateDisplay();
        }

        function calculate() {
            if (operator === '' || previousInput === '') return;
            
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            
            switch(operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': 
                    if (current === 0) {
                        alert('Cannot divide by zero!');
                        return;
                    }
                    result = prev / current; 
                    break;
                case '%': result = prev % current; break;
                default: return;
            }
            
            currentInput = parseFloat(result.toFixed(10)).toString();
            operator = '';
            previousInput = '';
            shouldResetScreen = true;
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = '';
            updateDisplay();
        }

        function clearEntry() {
            currentInput = '0';
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Scientific functions
        function insertFunction(func) {
            const current = parseFloat(currentInput);
            let result;
            
            switch(func) {
                case 'sin': result = Math.sin(current * Math.PI / 180); break;
                case 'cos': result = Math.cos(current * Math.PI / 180); break;
                case 'tan': result = Math.tan(current * Math.PI / 180); break;
                case 'sqrt': result = Math.sqrt(current); break;
                default: return;
            }
            
            currentInput = parseFloat(result.toFixed(10)).toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        function toggleSign() {
            currentInput = (parseFloat(currentInput) * -1).toString();
            updateDisplay();
        }

        // Mode toggle
        document.getElementById('standardTab').addEventListener('click', function() {
            isScientific = false;
            this.classList.add('active');
            document.getElementById('scientificTab').classList.remove('active');
            document.querySelectorAll('.scientific-extra').forEach(btn => btn.style.display = 'none');
        });

        document.getElementById('scientificTab').addEventListener('click', function() {
            isScientific = true;
            this.classList.add('active');
            document.getElementById('standardTab').classList.remove('active');
            document.querySelectorAll('.scientific-extra').forEach(btn => btn.style.display = 'flex');
        });

        // Initialize
        document.querySelectorAll('.scientific-extra').forEach(btn => btn.style.display = 'none');

        // Unit Converter
        let currentConvType = 'length';

        function setConvType(type) {
            currentConvType = type;
            document.querySelectorAll('.conv-type-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const fromSelect = document.getElementById('fromUnit');
            const toSelect = document.getElementById('toUnit');
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';
            
            let options = [];
            switch(type) {
                case 'length':
                    options = [
                        ['m', 'Meters'], ['km', 'Kilometers'], ['cm', 'Centimeters'],
                        ['mm', 'Millimeters'], ['ft', 'Feet'], ['in', 'Inches'],
                        ['yd', 'Yards'], ['mi', 'Miles']
                    ];
                    break;
                case 'weight':
                    options = [
                        ['kg', 'Kilograms'], ['g', 'Grams'], ['mg', 'Milligrams'],
                        ['lb', 'Pounds'], ['oz', 'Ounces'], ['st', 'Stone']
                    ];
                    break;
                case 'temp':
                    options = [
                        ['c', 'Celsius'], ['f', 'Fahrenheit'], ['k', 'Kelvin']
                    ];
                    break;
                case 'volume':
                    options = [
                        ['l', 'Liters'], ['ml', 'Milliliters'], ['gal', 'Gallons'],
                        ['qt', 'Quarts'], ['pt', 'Pints'], ['cup', 'Cups'], ['floz', 'Fluid Ounces']
                    ];
                    break;
            }
            
            options.forEach(([value, text]) => {
                fromSelect.add(new Option(text, value));
                toSelect.add(new Option(text, value));
            });
            
            // Set default selections
            if (type === 'length') {
                toSelect.value = 'ft';
            } else if (type === 'weight') {
                fromSelect.value = 'kg';
                toSelect.value = 'lb';
            } else if (type === 'temp') {
                fromSelect.value = 'c';
                toSelect.value = 'f';
            } else if (type === 'volume') {
                toSelect.value = 'gal';
            }
            
            document.getElementById('fromValue').value = '';
            document.getElementById('toValue').value = '';
        }

        function convert() {
            const fromValue = parseFloat(document.getElementById('fromValue').value);
            if (isNaN(fromValue)) {
                document.getElementById('toValue').value = '';
                return;
            }
            
            const fromUnit = document.getElementById('fromUnit').value;
            const toUnit = document.getElementById('toUnit').value;
            let result;
            
            if (currentConvType === 'temp') {
                // Temperature conversion
                let celsius;
                // Convert to Celsius first
                switch(fromUnit) {
                    case 'c': celsius = fromValue; break;
                    case 'f': celsius = (fromValue - 32) * 5/9; break;
                    case 'k': celsius = fromValue - 273.15; break;
                }
                // Convert from Celsius to target
                switch(toUnit) {
                    case 'c': result = celsius; break;
                    case 'f': result = (celsius * 9/5) + 32; break;
                    case 'k': result = celsius + 273.15; break;
                }
            } else {
                // Other conversions
                const unitData = units[currentConvType];
                const fromBase = fromValue * unitData[fromUnit];
                result = fromBase / unitData[toUnit];
            }
            
            document.getElementById('toValue').value = parseFloat(result.toFixed(6));
        }
    </script>
</body>
</html>
