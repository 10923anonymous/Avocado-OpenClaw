<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, height=480, initial-scale=1.0, user-scalable=no">
    <title>🍅 Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 800px;
            height: 480px;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe135 0%, #e8f5a8 25%, #90c040 50%, #2d5016 75%, #1a3d1a 100%);
            color: #fff;
        }

        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #2d5016, #3d6b1f);
            border: 3px solid #fff;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            z-index: 10000;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .back-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 10px 15px;
            background: linear-gradient(135deg, #2d5016, #3d6b1f);
            border: 3px solid #fff;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            z-index: 10000;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .container {
            width: 800px;
            height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 28px;
            color: #2d5016;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            margin-bottom: 3px;
        }

        .header .subtitle {
            font-size: 12px;
            color: #3d6b1f;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: 2px solid #2d5016;
            border-radius: 20px;
            background: rgba(255,255,255,0.3);
            color: #2d5016;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: #2d5016;
            color: #fff;
        }

        .timer-display {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 225, 53, 0.3), rgba(144, 192, 64, 0.3));
            border: 5px solid #2d5016;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            position: relative;
            box-shadow: 0 0 40px rgba(45, 80, 22, 0.4), inset 0 0 20px rgba(0,0,0,0.2);
        }

        .timer-display.break {
            border-color: #ffe135;
            background: linear-gradient(135deg, rgba(255, 225, 53, 0.4), rgba(232, 245, 168, 0.4));
            box-shadow: 0 0 40px rgba(255, 225, 53, 0.4), inset 0 0 20px rgba(0,0,0,0.2);
        }

        .progress-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 220px;
            height: 220px;
            transform: translate(-50%, -50%) rotate(-90deg);
            pointer-events: none;
        }

        .timer-display.digital .progress-ring {
            display: none;
        }

        .progress-ring svg {
            width: 100%;
            height: 100%;
        }

        .progress-ring-ellipse {
            fill: none;
            stroke: #ffe135;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 5px rgba(255, 225, 53, 0.8));
        }

        .timer-display.break .progress-ring-ellipse {
            stroke: #2d5016;
            filter: drop-shadow(0 0 5px rgba(45, 80, 22, 0.8));
        }

        .timer-display.digital {
            border-radius: 20px;
            width: 280px;
            height: 100px;
        }

        .timer-text {
            font-size: 42px;
            font-weight: bold;
            color: #2d5016;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            font-variant-numeric: tabular-nums;
            transition: transform 0.3s ease;
        }

        .timer-text.pulse {
            animation: pulse 1s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .timer-text.seconds {
            font-size: 32px;
        }

        .timer-label {
            font-size: 12px;
            color: #3d6b1f;
            margin-top: 5px;
            font-weight: bold;
        }

        .presets {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .preset-btn {
            padding: 6px 12px;
            border: 2px solid #2d5016;
            border-radius: 15px;
            background: rgba(255,255,255,0.4);
            color: #2d5016;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-btn:hover {
            background: #2d5016;
            color: #fff;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2d5016, #3d6b1f);
            color: #fff;
            box-shadow: 0 4px 15px rgba(45, 80, 22, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 80, 22, 0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.5);
            color: #2d5016;
            border: 2px solid #2d5016;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.7);
        }

        .btn-skip {
            background: linear-gradient(135deg, #ffe135, #e8c020);
            color: #2d5016;
            border: 2px solid #2d5016;
        }

        .btn-skip:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 225, 53, 0.4);
        }

        .settings {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .setting {
            text-align: center;
        }

        .setting label {
            display: block;
            font-size: 10px;
            color: #2d5016;
            margin-bottom: 3px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .setting input {
            width: 50px;
            padding: 5px;
            border: 2px solid #2d5016;
            border-radius: 8px;
            background: rgba(255,255,255,0.5);
            color: #2d5016;
            font-size: 14px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 11px;
            color: #2d5016;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #2d5016;
        }

        .volume-control {
            position: fixed;
            bottom: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.6);
            padding: 6px 10px;
            border-radius: 20px;
            border: 2px solid #2d5016;
        }

        .volume-control label {
            font-size: 12px;
            color: #2d5016;
        }

        .volume-control input {
            width: 60px;
        }
    </style>
</head>
<body>
    <a href="https://10923anonymous.github.io/Avocado-OpenClaw/avocado-website/touchscreen.html" class="back-button" id="backBtn">← Back</a>
    <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>
    
    <div class="container">
        <div class="header">
            <h1>🍅 Pomodoro Timer</h1>
            <div class="subtitle">Stay focused, take breaks</div>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" id="circleMode">⭕ Circle</button>
            <button class="mode-btn" id="digitalMode">🔢 Digital</button>
        </div>

        <div class="presets">
            <button class="preset-btn" onclick="setPreset(25, 5)">🍅 25/5</button>
            <button class="preset-btn" onclick="setPreset(45, 15)">🎯 45/15</button>
            <button class="preset-btn" onclick="setPreset(50, 10)">⚡ 50/10</button>
            <button class="preset-btn" onclick="setPreset(90, 20)">🚀 90/20</button>
        </div>

        <div class="timer-display" id="timerDisplay">
            <div class="progress-ring" id="progressRing">
                <svg viewBox="0 0 220 220" preserveAspectRatio="none">
                    <ellipse class="progress-ring-ellipse" id="progressEllipse" cx="110" cy="110" rx="106" ry="106"/>
                </svg>
            </div>
            <div class="timer-text" id="timerText">25:00</div>
            <div class="timer-label" id="timerLabel">Focus Time</div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">Start</button>
            <button class="btn btn-secondary" id="pauseBtn" style="display:none;">Pause</button>
            <button class="btn btn-secondary" id="resetBtn">Reset</button>
            <button class="btn btn-skip" id="skipBtn">Skip ⏭</button>
        </div>

        <div class="settings">
            <div class="setting">
                <label>Focus (min)</label>
                <input type="number" id="focusTime" value="25" min="1" max="180">
            </div>
            <div class="setting">
                <label>Break (min)</label>
                <input type="number" id="breakTime" value="5" min="1" max="60">
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="completedPomodoros">0</div>
                <div>Completed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalFocusTime">0</div>
                <div>Focus (min)</div>
            </div>
        </div>
    </div>

    <div class="volume-control">
        <label>🔊</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="20">
    </div>

    <script>
        // Audio elements - using low volume (0.2 = 20%)
        const focusMusic = new Audio('https://10923anonymous.github.io/Avocado-OpenClaw/assets/audio/focus-music.mp3');
        const breakMusic = new Audio('https://10923anonymous.github.io/Avocado-OpenClaw/assets/audio/avocado-music.mp3');
        const bellSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        
        // Set initial low volume
        focusMusic.volume = 0.2;
        breakMusic.volume = 0.2;
        bellSound.volume = 0.5;
        focusMusic.loop = true;
        breakMusic.loop = true;

        // Progress ring setup
        const progressEllipse = document.getElementById('progressEllipse');
        const rx = 106;
        const ry = 106;
        // Approximate ellipse circumference using Ramanujan approximation
        const circumference = Math.PI * (3 * (rx + ry) - Math.sqrt((3 * rx + ry) * (rx + 3 * ry)));
        progressEllipse.style.strokeDasharray = `${circumference} ${circumference}`;
        progressEllipse.style.strokeDashoffset = 0;

        // Timer state
        let timeLeft = 25 * 60; // seconds
        let isRunning = false;
        let isFocusMode = true;
        let timerInterval = null;
        let completedPomodoros = 0;
        let totalFocusMinutes = 0;
        let displayMode = 'circle'; // 'circle' or 'digital'

        // DOM elements
        const timerDisplay = document.getElementById('timerDisplay');
        const timerText = document.getElementById('timerText');
        const timerLabel = document.getElementById('timerLabel');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const skipBtn = document.getElementById('skipBtn');
        const focusTimeInput = document.getElementById('focusTime');
        const breakTimeInput = document.getElementById('breakTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const completedPomodorosEl = document.getElementById('completedPomodoros');
        const totalFocusTimeEl = document.getElementById('totalFocusTime');
        const circleModeBtn = document.getElementById('circleMode');
        const digitalModeBtn = document.getElementById('digitalMode');

        // Format time based on display mode
        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (displayMode === 'digital') {
                return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            } else {
                // Circle mode: show hours if present
                if (hours > 0) {
                    return `${hours}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }

        // Update display
        function updateDisplay() {
            const oldText = timerText.textContent;
            const newText = formatTime(timeLeft);
            timerText.textContent = newText;
            
            // Add pulse animation when seconds change
            if (oldText !== newText && isRunning) {
                timerText.classList.remove('pulse');
                void timerText.offsetWidth; // Trigger reflow
                timerText.classList.add('pulse');
            }
        }

        // Update progress ring
        function updateProgressRing() {
            const totalTime = isFocusMode 
                ? parseInt(focusTimeInput.value) * 60 
                : parseInt(breakTimeInput.value) * 60;
            const offset = circumference - (timeLeft / totalTime) * circumference;
            progressEllipse.style.strokeDashoffset = offset;
        }

        // Switch between focus and break modes
        function switchMode() {
            if (isFocusMode) {
                // Switch to break
                isFocusMode = false;
                timeLeft = parseInt(breakTimeInput.value) * 60;
                timerLabel.textContent = 'Break Time';
                timerDisplay.classList.add('break');
                // Stop focus music, play break music
                focusMusic.pause();
                focusMusic.currentTime = 0;
                breakMusic.play();
            } else {
                // Switch to focus
                isFocusMode = true;
                timeLeft = parseInt(focusTimeInput.value) * 60;
                timerLabel.textContent = 'Focus Time';
                timerDisplay.classList.remove('break');
                // Stop break music, play focus music
                breakMusic.pause();
                breakMusic.currentTime = 0;
                focusMusic.play();
            }
            updateDisplay();
        }

        // Skip current session
        function skipSession() {
            pauseTimer();
            if (isFocusMode) {
                completedPomodoros++;
                totalFocusMinutes += parseInt(focusTimeInput.value);
                completedPomodorosEl.textContent = completedPomodoros;
                totalFocusTimeEl.textContent = totalFocusMinutes;
            }
            switchMode();
        }

        // Timer tick
        function tick() {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
                updateProgressRing();
            } else {
                // Timer finished - play bell sound
                bellSound.currentTime = 0;
                bellSound.play();
                if (isFocusMode) {
                    completedPomodoros++;
                    totalFocusMinutes += parseInt(focusTimeInput.value);
                    completedPomodorosEl.textContent = completedPomodoros;
                    totalFocusTimeEl.textContent = totalFocusMinutes;
                }
                switchMode();
            }
        }

        // Start timer
        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                startBtn.style.display = 'none';
                pauseBtn.style.display = 'inline-block';
                // Play appropriate music
                if (isFocusMode) {
                    focusMusic.play();
                } else {
                    breakMusic.play();
                }
                timerInterval = setInterval(tick, 1000);
            }
        }

        // Pause timer
        function pauseTimer() {
            if (isRunning) {
                isRunning = false;
                startBtn.style.display = 'inline-block';
                pauseBtn.style.display = 'none';
                clearInterval(timerInterval);
                // Pause music
                focusMusic.pause();
                breakMusic.pause();
            }
        }

        // Reset timer
        function resetTimer() {
            pauseTimer();
            isFocusMode = true;
            timeLeft = parseInt(focusTimeInput.value) * 60;
            timerLabel.textContent = 'Focus Time';
            timerDisplay.classList.remove('break');
            focusMusic.pause();
            focusMusic.currentTime = 0;
            breakMusic.pause();
            breakMusic.currentTime = 0;
            // Reset progress ring
            progressEllipse.style.strokeDashoffset = 0;
            updateDisplay();
        }

        // Set preset times
        function setPreset(focus, breakTime) {
            pauseTimer();
            focusTimeInput.value = focus;
            breakTimeInput.value = breakTime;
            isFocusMode = true;
            timeLeft = focus * 60;
            timerLabel.textContent = 'Focus Time';
            timerDisplay.classList.remove('break');
            // Reset progress ring
            progressEllipse.style.strokeDashoffset = 0;
            updateDisplay();
        }

        // Toggle display mode
        function setDisplayMode(mode) {
            displayMode = mode;
            if (mode === 'digital') {
                timerDisplay.classList.add('digital');
                timerText.classList.add('seconds');
                circleModeBtn.classList.remove('active');
                digitalModeBtn.classList.add('active');
            } else {
                timerDisplay.classList.remove('digital');
                timerText.classList.remove('seconds');
                circleModeBtn.classList.add('active');
                digitalModeBtn.classList.remove('active');
            }
            updateDisplay();
        }

        // Volume control
        volumeSlider.addEventListener('input', function() {
            const volume = this.value / 100;
            focusMusic.volume = volume;
            breakMusic.volume = volume;
        });

        // Settings change handlers
        focusTimeInput.addEventListener('change', function() {
            if (!isRunning && isFocusMode) {
                timeLeft = parseInt(this.value) * 60;
                updateDisplay();
            }
        });

        breakTimeInput.addEventListener('change', function() {
            if (!isRunning && !isFocusMode) {
                timeLeft = parseInt(this.value) * 60;
                updateDisplay();
            }
        });

        // Button event listeners
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        skipBtn.addEventListener('click', skipSession);
        circleModeBtn.addEventListener('click', () => setDisplayMode('circle'));
        digitalModeBtn.addEventListener('click', () => setDisplayMode('digital'));

        // Initialize display
        updateDisplay();

        // Fullscreen functions
        function updateFullscreenButton() {
            const btn = document.getElementById('fullscreenBtn');
            if (document.fullscreenElement) {
                btn.innerHTML = '&#x1F5D9;';
                btn.title = 'Exit Fullscreen';
            } else {
                btn.innerHTML = '&#x26F6;';
                btn.title = 'Enter Fullscreen';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                updateFullscreenButton();
            }
        });
        window.addEventListener('focus', updateFullscreenButton);

        // Auto-enter fullscreen if user was in fullscreen on previous page
        document.addEventListener('DOMContentLoaded', () => {
            // Check if we should be in fullscreen (user clicked link while fullscreen)
            if (localStorage.getItem('wasFullscreen') === 'true') {
                localStorage.removeItem('wasFullscreen');
                // Small delay to allow page to render first
                setTimeout(() => {
                    toggleFullscreen();
                }, 100);
            }
        });

        // Save fullscreen state before leaving
        document.getElementById('backBtn').addEventListener('click', (e) => {
            if (document.fullscreenElement) {
                localStorage.setItem('wasFullscreen', 'true');
            }
        });
    </script>
</body>
</html>
